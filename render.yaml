services:
  - type: web
    name: pdf-knowledge-assistant
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: UPLOAD_DIR
        value: storage/uploads
      - key: INDEX_DIR
        value: storage/index
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CHUNK_SIZE
        value: 900
      - key: CHUNK_OVERLAP
        value: 150
      - key: TOP_K
        value: 5
      - key: LLM_PROVIDER
        value: mock
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
