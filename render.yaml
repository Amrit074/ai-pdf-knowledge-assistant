services:
  - type: web
    name: pdf-knowledge-assistant
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: UPLOAD_DIR
        value: storage/uploads
      - key: INDEX_DIR
        value: storage/index
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: EMBEDDING_MODEL
        value: models/gemini-embedding-001
      - key: EMBEDDING_DIMENSION
        value: 768
      - key: EMBEDDING_BATCH_SIZE
        value: 16
      - key: CHUNK_SIZE
        value: 900
      - key: CHUNK_OVERLAP
        value: 150
      - key: TOP_K
        value: 5
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
